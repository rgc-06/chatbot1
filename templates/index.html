<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1e1e2e;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        .header {
            background: #0f3460;
            padding: 20px;
            text-align: center;
            color: #fff;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            color: #a0a0b0;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #2d2d44;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message.error {
            align-self: center;
            background: #3a1a1a;
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            max-width: 90%;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: #1e1e2e;
            border-top: 1px solid #2d2d44;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #2d2d44;
            border-radius: 10px;
            background: #16213e;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #0f3460;
        }
        input[type="text"]::placeholder {
            color: #666;
        }
        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.3s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .reset-btn {
            padding: 8px 16px;
            background: #3a1a1a;
            font-size: 14px;
        }
        .reset-btn:hover:not(:disabled) {
            background: #4a2a2a;
        }
        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        /* Scrollbar styling */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #2d2d44;
            border-radius: 4px;
        }
        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #3d3d5c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Chatbot</h1>
            <p>Conversation memory is volatile - resets on server restart</p>
        </div>
        
        <div class="chat-area" id="chat-area">
            <!-- Messages will appear here -->
        </div>
        
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <div class="input-group">
                <button class="reset-btn" id="reset-btn" onclick="resetChat()" title="Reset conversation">Reset</button>
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Generate or retrieve session ID from localStorage
        let sessionId = localStorage.getItem('chat_session');
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem('chat_session', sessionId);
        }

        const chatArea = document.getElementById('chat-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Send message to API
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Add user message to UI
            addMessageToUI('user', text);
            messageInput.value = '';
            sendBtn.disabled = true;
            messageInput.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-ID': sessionId
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessageToUI('assistant', data.response);
                } else {
                    addMessageToUI('error', data.error || 'Failed to get response');
                }
            } catch (error) {
                addMessageToUI('error', 'Connection error. Please try again.');
            } finally {
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
                scrollToBottom();
            }
        }

        // Load conversation history on page load
        async function loadHistory() {
            try {
                const response = await fetch('/history', {
                    headers: { 'X-Session-ID': sessionId }
                });
                const data = await response.json();
                
                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => {
                        addMessageToUI(msg.role === 'user' ? 'user' : 'assistant', msg.content);
                    });
                }
                scrollToBottom();
            } catch (e) {
                console.error('Failed to load history:', e);
            }
        }

        // Add message bubble to chat area
        function addMessageToUI(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.textContent = text;
            chatArea.appendChild(msgDiv);
            scrollToBottom();
        }

        // Scroll to the bottom of chat area
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Reset conversation
        async function resetChat() {
            if (!confirm('Are you sure you want to reset this conversation?')) return;
            
            try {
                await fetch('/reset', {
                    method: 'POST',
                    headers: { 'X-Session-ID': sessionId }
                });
                chatArea.innerHTML = '';
                localStorage.removeItem('chat_session');
                sessionId = crypto.randomUUID();
                localStorage.setItem('chat_session', sessionId);
            } catch (error) {
                addMessageToUI('error', 'Failed to reset conversation');
            }
        }

        // Initial load
        loadHistory();
    </script>
</body>
</html>
